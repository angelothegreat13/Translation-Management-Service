services:
  # Nginx Web Server
  nginx:
    image: nginx:1.25-alpine
    container_name: ts_nginx
    ports:
      - "8000:80"
    volumes:
      - .:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      app:
        condition: service_started
    networks:
      - ts_network

  # PHP-FPM Application
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
      target: development
    container_name: ts_app
    volumes:
      - .:/var/www
      - ts_vendor:/var/www/vendor
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - DB_HOST=db
      - DB_PORT=3306
      - DB_DATABASE=translation_service
      - DB_USERNAME=laravel
      - DB_PASSWORD=secret
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    networks:
      - ts_network

  # MySQL Database
  db:
    image: mysql:8.0
    container_name: ts_db
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: translation_service
      MYSQL_USER: laravel
      MYSQL_PASSWORD: secret
    volumes:
      - ts_db_data:/var/lib/mysql
      - ./docker/mysql/my.cnf:/etc/mysql/conf.d/my.cnf
      - ./docker/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - ts_network

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: ts_redis
    ports:
      - "6379:6379"
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - ts_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - ts_network

networks:
  ts_network:
    driver: bridge

volumes:
  ts_vendor:
  ts_db_data:
  ts_redis_data:
